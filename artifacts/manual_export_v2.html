<!doctype html>
<html><head><meta charset="utf-8"><title>Cut sheet visuals</title>
<style>body{font-family:Segoe UI,Arial,Helvetica,sans-serif;margin:20px;background:#fff;color:#222} .notice{background:#fff3cd;border:1px solid #ffeeba;padding:12px;border-radius:6px;margin-bottom:12px} svg{max-width:100%;height:auto;border:1px solid #e6e6e6}</style>
</head><body>
<div class="notice">This is an HTML fallback. PDF rasterization requires SkiaSharp+Svg.Skia at build/runtime. To enable PDF output, build with HAS_SKIA and install native Skia libs on the runner. See docs/docs/packer.md for instructions.</div>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="100">

  <g id="board-0">

    <rect x="10" y="10" width="960" height="60" fill="#F5F5F5" stroke="#333" stroke-width="1" rx="2" />
    <text x="14" y="24" font-family="Arial,Helvetica,sans-serif" font-size=12 fill="#222">Board 0 (96in x 6in)</text>
    <rect x="850" y="10" width="120" height="60" fill="#BDBDBD" fill-opacity="0.5" stroke="#777" stroke-dasharray="4 2" />
    <text x="854" y="66" font-family="Arial,Helvetica,sans-serif" font-size=10 fill="#222">Remnant 12in</text>
  </g>

  <g id="scale">

    <rect x="10" y="8" width="960" height="10" fill="#EEE" stroke="#999" stroke-width=0.5 />
    <line x1="10" y1="8" x2="10" y2="18" stroke="#666" stroke-width=1 />
    <text x="12" y="30" font-family="Arial,Helvetica,sans-serif" font-size=10 fill="#333">0in</text>
    <line x1="130" y1="8" x2="130" y2="18" stroke="#666" stroke-width=1 />
    <text x="132" y="30" font-family="Arial,Helvetica,sans-serif" font-size=10 fill="#333">12in</text>
    <line x1="250" y1="8" x2="250" y2="18" stroke="#666" stroke-width=1 />
    <text x="252" y="30" font-family="Arial,Helvetica,sans-serif" font-size=10 fill="#333">24in</text>
    <line x1="370" y1="8" x2="370" y2="18" stroke="#666" stroke-width=1 />
    <text x="372" y="30" font-family="Arial,Helvetica,sans-serif" font-size=10 fill="#333">36in</text>
    <line x1="490" y1="8" x2="490" y2="18" stroke="#666" stroke-width=1 />
    <text x="492" y="30" font-family="Arial,Helvetica,sans-serif" font-size=10 fill="#333">48in</text>
    <line x1="610" y1="8" x2="610" y2="18" stroke="#666" stroke-width=1 />
    <text x="612" y="30" font-family="Arial,Helvetica,sans-serif" font-size=10 fill="#333">60in</text>
    <line x1="730" y1="8" x2="730" y2="18" stroke="#666" stroke-width=1 />

    <line x1="850" y1="8" x2="850" y2="18" stroke="#666" stroke-width=1 />
    <text x="852" y="30" font-family="Arial,Helvetica,sans-serif" font-size=10 fill="#333">84in</text>
    <line x1="970" y1="8" x2="970" y2="18" stroke="#666" stroke-width=1 />
    <text x="972" y="30" font-family="Arial,Helvetica,sans-serif" font-size=10 fill="#333">96in</text>
  </g>

  <g id="legend">

    <rect x="10" y="20" width="960" height="70" fill="#FAFAFA" stroke="#CCC" stroke-width=1 />
    <text x="16" y="36" font-family="Arial,Helvetica,sans-serif" font-size=12 fill="#222">Legend</text>
  </g>

</svg>

</body></html>
