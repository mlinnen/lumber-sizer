name: .NET CI
on:
  push:
    branches: [ master, 'feature/*' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ["10.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: |
          dotnet restore src/WWA.slnx
          dotnet restore tests/WWA.Core.Tests/WWA.Core.Tests.csproj

      - name: Build
        run: dotnet build src/WWA.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/WWA.Core.Tests/WWA.Core.Tests.csproj --no-restore --configuration Release --verbosity normal

  skia:
    name: Skia build & tests (HAS_SKIA)
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Install native dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1 libfreetype6 libx11-6 libxrandr2 libxrender1 libxext6

      - name: Install native dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install pkg-config fontconfig freetype cairo libpng

      - name: Install native dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y vcredist140

      - name: Restore
        run: |
          dotnet restore src/WWA.slnx
          dotnet restore tests/WWA.Core.Tests/WWA.Core.Tests.csproj

      - name: Build (HAS_SKIA)
        run: dotnet build src/WWA.slnx --no-restore --configuration Release -p:DefineConstants=HAS_SKIA

      - name: Test (HAS_SKIA)
        run: dotnet test tests/WWA.Core.Tests/WWA.Core.Tests.csproj --no-restore --configuration Release -p:DefineConstants=HAS_SKIA --verbosity normal

  publish:
    name: Publish CLI artifacts (${{ matrix.rid }})
    if: github.event_name != 'pull_request'
    needs: [build, skia]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: wwa-cli-release-has-skia-linux-x64
          - os: macos-13
            rid: osx-x64
            artifact_name: wwa-cli-release-has-skia-osx-x64
          - os: windows-latest
            rid: win-x64
            artifact_name: wwa-cli-release-has-skia-win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Restore
        run: dotnet restore src/WWA.Cli/WWA.Cli.csproj --runtime ${{ matrix.rid }}

      - name: Publish CLI (Release + HAS_SKIA)
        run: dotnet publish src/WWA.Cli/WWA.Cli.csproj --no-restore --configuration Release --runtime ${{ matrix.rid }} --self-contained false -p:DefineConstants=HAS_SKIA --output artifacts/publish/${{ matrix.rid }}

      - name: Smoke test published CLI
        shell: pwsh
        run: |
          $publishDir = Resolve-Path "artifacts/publish/${{ matrix.rid }}"
          if ($IsWindows)
          {
            & (Join-Path $publishDir 'WWA.Cli.exe')
          }
          else
          {
            & (Join-Path $publishDir 'WWA.Cli')
          }

      - name: Upload published CLI
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/publish/${{ matrix.rid }}
          if-no-files-found: error

  packer-bench:
    name: Packer benchmarks
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Restore packer-bench
        run: dotnet restore tools/packer-bench/PackBench.csproj

      - name: Build packer-bench (Debug)
        run: dotnet build tools/packer-bench/PackBench.csproj --no-restore --configuration Debug

      - name: Run packer bench
        run: dotnet run --project tools/packer-bench/PackBench.csproj --no-build --configuration Debug --verbosity minimal

      - name: Upload benchmarks
        uses: actions/upload-artifact@v4
        with:
          name: packer-bench-results
          path: tools/packer-bench/artifacts/packer_bench.txt
