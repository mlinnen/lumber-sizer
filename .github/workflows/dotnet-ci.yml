name: .NET CI
on:
  push:
    branches: [ master, 'feature/*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ["10.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore src/WWA.slnx

      - name: Build
        run: dotnet build src/WWA.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/WWA.Core.Tests/WWA.Core.Tests.csproj --no-build --verbosity normal

  skia:
    name: Skia build & tests (HAS_SKIA)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1 libfreetype6 libx11-6 libxrandr2 libxrender1 libxext6 libasound2

      - name: Restore
        run: dotnet restore src/WWA.slnx

      - name: Build (HAS_SKIA)
        run: dotnet build src/WWA.slnx --no-restore --configuration Release -p:DefineConstants=HAS_SKIA

      - name: Test (HAS_SKIA)
        run: dotnet test tests/WWA.Core.Tests/WWA.Core.Tests.csproj --no-build -p:DefineConstants=HAS_SKIA --verbosity normal

