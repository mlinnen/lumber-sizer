name: .NET CI
on:
  push:
    branches: [ master, 'feature/*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ["10.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore src/WWA.slnx

      - name: Build
        run: dotnet build src/WWA.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/WWA.Core.Tests/WWA.Core.Tests.csproj --no-build --verbosity normal

