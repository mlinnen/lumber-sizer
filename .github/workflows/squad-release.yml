name: Squad Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload assets for
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release-assets:
    name: Publish release asset (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive_kind: tar.gz
          - os: windows-latest
            rid: win-x64
            archive_kind: zip
          - os: windows-11-arm
            rid: win-arm64
            archive_kind: zip

    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Restore
        run: dotnet restore src/WWA.Cli/WWA.Cli.csproj --runtime ${{ matrix.rid }}

      - name: Publish CLI (Release + HAS_SKIA)
        run: dotnet publish src/WWA.Cli/WWA.Cli.csproj --no-restore --configuration Release --runtime ${{ matrix.rid }} --self-contained false -p:DefineConstants=HAS_SKIA --output artifacts/publish/${{ matrix.rid }}

      - name: Smoke test published CLI
        shell: pwsh
        run: |
          $publishDir = Resolve-Path "artifacts/publish/${{ matrix.rid }}"
          if ($IsWindows)
          {
            $output = & (Join-Path $publishDir 'WWA.Cli.exe')
          }
          else
          {
            $output = & (Join-Path $publishDir 'WWA.Cli')
          }

          if (-not ($output -match 'WWA CLI'))
          {
            throw "Published CLI did not print expected help text."
          }

      - name: Package Windows release asset
        if: matrix.archive_kind == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "artifacts/publish/${{ matrix.rid }}\*" -DestinationPath "artifacts/lumber-sizer-$env:RELEASE_TAG-${{ matrix.rid }}.zip" -Force

      - name: Package Linux release asset
        if: matrix.archive_kind == 'tar.gz'
        run: tar -czf artifacts/lumber-sizer-$RELEASE_TAG-${{ matrix.rid }}.tar.gz -C artifacts/publish/${{ matrix.rid }} .

      - name: Upload asset to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assetPath = if ('${{ matrix.archive_kind }}' -eq 'zip')
          {
            "artifacts/lumber-sizer-$env:RELEASE_TAG-${{ matrix.rid }}.zip"
          }
          else
          {
            "artifacts/lumber-sizer-$env:RELEASE_TAG-${{ matrix.rid }}.tar.gz"
          }

          gh release upload $env:RELEASE_TAG $assetPath --clobber --repo $env:GITHUB_REPOSITORY
